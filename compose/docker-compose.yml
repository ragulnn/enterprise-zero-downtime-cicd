
services:
  backend:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    container_name: enterprise-backend
    ports:
      - "8000:8000"

  frontend:
    build:
      context: /mnt/c/Users/ragul/.gemini/antigravity/scratch/portfolio-ragul
      dockerfile: Dockerfile
    container_name: portfolio-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: http://backend:8000

  nginx:
    image: nginx:latest
    container_name: enterprise-nginx
    ports:
      - "80:80"
    volumes:
      - ../nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
